spring.application.name=expense-tracker

# Server port — Railway sets PORT automatically, fallback to 8080 locally
server.port=${PORT:8080}

# MySQL — reads from environment variables, fallback to local values
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/expense_tracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:none}
spring.jpa.show-sql=${SPRING_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT — reads from environment variables, fallback to local values
jwt.secret=${JWT_SECRET:ExpenseTrackerSuperSecretKeyForJWTMustBe256BitsLong2025SecureApp}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# Logging
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:DEBUG}
logging.level.com.expensetracker=${LOG_LEVEL_APP:DEBUG}