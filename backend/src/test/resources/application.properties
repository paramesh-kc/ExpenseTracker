spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/expense_tracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:create-drop}
jwt.secret=${JWT_SECRET:ExpenseTrackerSuperSecretKeyForJWTMustBe256BitsLong2025SecureApp}
jwt.expiration=${JWT_EXPIRATION:86400000}
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=ERROR
logging.level.com.expensetracker=ERROR