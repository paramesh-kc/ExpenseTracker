spring.application.name=expense-tracker
server.port=8080

# MySQL Connection (auto-creates database!)
spring.datasource.url=jdbc:mysql://localhost:3306/expense_tracker?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=ExpenseTrackerSuperSecretKeyForJWTMustBe256BitsLong2025SecureApp
jwt.expiration=86400000

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.expensetracker=DEBUG